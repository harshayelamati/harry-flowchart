<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harry Agent OS — Architecture Explorer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04081c;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:12px;overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* ── Auth gate ── */
#auth-gate{position:fixed;inset:0;background:#04081c;z-index:9999;display:flex;align-items:center;justify-content:center}
#auth-box{background:#080f22;border:1px solid #1e3060;border-radius:12px;padding:44px 52px;display:flex;flex-direction:column;align-items:center;gap:22px;box-shadow:0 0 60px rgba(59,130,246,0.1)}
#auth-logo{font-size:30px;letter-spacing:5px;color:#3b82f6;font-weight:700;text-shadow:0 0 24px rgba(59,130,246,0.5)}
#auth-subtitle{font-size:10px;color:#334155;letter-spacing:2px;text-transform:uppercase;margin-top:-12px}
#auth-label{font-size:10px;color:#475569;letter-spacing:1px;text-transform:uppercase;align-self:flex-start}
#auth-input{background:#04081c;border:1px solid #1e3060;color:#e2e8f0;padding:10px 16px;border-radius:6px;font-family:inherit;font-size:16px;width:240px;letter-spacing:5px;text-align:center;outline:none;transition:border-color .2s}
#auth-input:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
#auth-input.shake{animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
#auth-btn{background:#1e3a8a;color:#93c5fd;border:1px solid #2563eb;border-radius:6px;padding:9px 36px;font-family:inherit;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background .15s;width:100%}
#auth-btn:hover{background:#2563eb;color:#fff}
#auth-error{font-size:10px;color:#ef4444;letter-spacing:1px;min-height:14px}
#auth-hint{font-size:9px;color:#1e293b;letter-spacing:1px}

/* ── Top bar ── */
#topbar{height:44px;min-height:44px;background:#060d20;border-bottom:1px solid #1e2d50;display:flex;align-items:center;gap:16px;padding:0 16px;flex-shrink:0}
#topbar-logo{font-size:13px;font-weight:700;color:#3b82f6;letter-spacing:3px;text-shadow:0 0 12px rgba(59,130,246,.4);white-space:nowrap}
#topbar-sep{color:#1e2d50;font-size:16px}
#topbar-title{font-size:10px;color:#475569;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
#search-input{flex:1;max-width:320px;background:#04081c;border:1px solid #1e3060;color:#a0b4d0;padding:5px 10px;border-radius:5px;font-size:11px;font-family:inherit;outline:none}
#search-input:focus{border-color:#3b82f6}
#search-input::placeholder{color:#1e3a5f}
#topbar-stats{margin-left:auto;display:flex;gap:16px}
.stat-pill{font-size:9px;color:#334155;letter-spacing:1px;display:flex;gap:5px;align-items:center}
.stat-num{color:#3b82f6;font-weight:700}

/* ── Main layout ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── Left sidebar ── */
#sidebar{width:260px;min-width:260px;background:#060d20;border-right:1px solid #1e2d50;display:flex;flex-direction:column;overflow:hidden}
#sidebar-list{overflow-y:auto;flex:1;padding:8px 0}
.layer-group{margin-bottom:2px}
.layer-hdr{padding:7px 12px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:7px;user-select:none;transition:background .1s}
.layer-hdr:hover{background:#0a1428}
.layer-hdr-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.layer-hdr-label{flex:1;color:#475569}
.layer-hdr-count{font-size:9px;color:#1e3060;font-weight:700}
.layer-hdr-arrow{font-size:8px;color:#1e3060;transition:transform .15s}
.layer-group.open .layer-hdr-arrow{transform:rotate(90deg)}
.layer-nodes{display:none}
.layer-group.open .layer-nodes{display:block}
.node-item{padding:5px 12px 5px 26px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .1s;border-radius:0}
.node-item:hover{background:#0a1428}
.node-item.active{background:#0f1e3a;border-left:2px solid #3b82f6;padding-left:24px}
.node-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.node-name{font-size:10px;color:#64748b;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-item.active .node-name{color:#cbd5e1}
.node-item.match .node-name{color:#93c5fd}

/* ── Detail pane ── */
#detail{flex:1;overflow-y:auto;padding:0;background:#04081c}
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#1e3060}
#welcome-logo{font-size:48px;letter-spacing:8px;color:#0f2040;font-weight:700}
#welcome-sub{font-size:10px;letter-spacing:2px;color:#1e2d50;text-transform:uppercase}

/* ── Detail content ── */
#detail-content{display:none;padding:0}
#dc-hero{padding:24px 28px 18px;border-bottom:1px solid #0f1e3a;background:#060d20}
#dc-file{font-size:11px;color:#3b82f6;font-family:monospace;margin-bottom:4px}
#dc-name{font-size:20px;font-weight:700;color:#e2e8f0;margin-bottom:6px;line-height:1.2}
#dc-sublabel{font-size:11px;color:#475569;margin-bottom:14px}
#dc-desc{font-size:11px;color:#94a3b8;line-height:1.7;max-width:760px}
#dc-body{padding:20px 28px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){#dc-body{grid-template-columns:1fr}}
.dc-card{background:#060d20;border:1px solid #0f1e3a;border-radius:8px;overflow:hidden}
.dc-card-hdr{padding:8px 14px;background:#080f22;border-bottom:1px solid #0f1e3a;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#334155;display:flex;align-items:center;gap:7px}
.dc-card-hdr-dot{width:6px;height:6px;border-radius:50%}
.dc-card-body{padding:12px 14px}
.lines-grid{display:flex;flex-direction:column;gap:6px}
.line-row{display:flex;align-items:center;gap:8px}
.line-key{font-size:10px;color:#334155;width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.line-badge{display:inline-block;background:#0d1a36;border:1px solid #1e3060;color:#3b82f6;font-size:10px;padding:2px 8px;border-radius:4px;font-family:monospace;cursor:pointer;transition:border-color .15s}
.line-badge:hover{border-color:#3b82f6;background:#0f1e3a}
.break-item{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;padding:7px 10px;border-radius:5px;border:1px solid}
.break-item.fixed{background:#051a0e;border-color:#14532d}
.break-item.unfixed{background:#1a0505;border-color:#450a0a}
.break-status{font-size:9px;font-weight:700;width:36px;flex-shrink:0;padding-top:1px;letter-spacing:.5px}
.break-status.ok{color:#4ade80}
.break-status.warn{color:#f87171}
.break-text{font-size:10px;color:#94a3b8;line-height:1.5;flex:1}
.check-item{display:flex;gap:8px;margin-bottom:7px;align-items:flex-start}
.check-num{color:#1e4080;font-size:10px;width:18px;flex-shrink:0;padding-top:1px}
.check-text{font-size:10px;color:#64748b;line-height:1.5;flex:1}
.impact-list{display:flex;flex-direction:column;gap:5px}
.impact-item{font-size:10px;color:#475569;padding:5px 8px;background:#04081c;border:1px solid #0f1e3a;border-radius:4px;display:flex;align-items:center;gap:6px;line-height:1.4}
.impact-item::before{content:'→';color:#1e3060;flex-shrink:0}
.conn-section{margin-bottom:10px}
.conn-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;padding:3px 0}
.conn-calls{color:#3b82f6}.conn-from{color:#22c55e}
.conn-item{display:flex;align-items:center;gap:8px;padding:5px 8px;background:#04081c;border:1px solid #0f1e3a;border-radius:4px;margin-bottom:4px;cursor:pointer;transition:border-color .15s}
.conn-item:hover{border-color:#1e3060}
.conn-item-arrow{font-size:10px;flex-shrink:0}
.conn-item-name{font-size:10px;color:#60a5fa;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conn-item-label{font-size:9px;color:#1e3060;text-align:right;white-space:nowrap}

/* ── Layer badge in hero ── */
.layer-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:3px;border:1px solid;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#04081c}
::-webkit-scrollbar-thumb{background:#1e2d50;border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#2d3f6b}
</style>
</head>
<body>

<!-- Auth gate -->
<div id="auth-gate">
  <div id="auth-box">
    <div id="auth-logo">HARRY</div>
    <div id="auth-subtitle">Agent OS · Architecture Explorer</div>
    <div id="auth-label">Access PIN</div>
    <input id="auth-input" type="password" maxlength="12" placeholder="••••••" autocomplete="off" autofocus>
    <div id="auth-error"></div>
    <button id="auth-btn">UNLOCK</button>
    <div id="auth-hint">Authorized access only</div>
  </div>
</div>

<!-- Top bar -->
<div id="topbar">
  <div id="topbar-logo">HARRY</div>
  <div id="topbar-sep">·</div>
  <div id="topbar-title">Architecture Explorer</div>
  <input id="search-input" placeholder="Search modules, files, features…" autocomplete="off">
  <div id="topbar-stats">
    <div class="stat-pill"><span class="stat-num" id="stat-modules">34</span> modules</div>
    <div class="stat-pill"><span class="stat-num" id="stat-layers">10</span> layers</div>
    <div class="stat-pill"><span class="stat-num" id="stat-edges">37</span> connections</div>
  </div>
</div>

<!-- Main -->
<div id="main">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-list"></div>
  </div>

  <!-- Detail pane -->
  <div id="detail">
    <div id="welcome">
      <div id="welcome-logo">H</div>
      <div id="welcome-sub">Select a module from the sidebar</div>
    </div>
    <div id="detail-content">
      <div id="dc-hero">
        <div id="dc-file"></div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div id="dc-name"></div>
          <div id="dc-badge" class="layer-badge"></div>
        </div>
        <div id="dc-sublabel"></div>
        <div id="dc-desc"></div>
      </div>
      <div id="dc-body"></div>
    </div>
  </div>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const LAYERS=[
  {id:'entry',    label:'Entry Points',             color:'#2563eb'},
  {id:'master',   label:'Master Dispatcher',        color:'#7c3aed'},
  {id:'pipeline', label:'Cognitive Pipeline',       color:'#7c3aed'},
  {id:'routing',  label:'Routing Layer',            color:'#1d4ed8'},
  {id:'intelligence',label:'Intelligence Modules',  color:'#065f46'},
  {id:'agents',   label:'Agent Layer',              color:'#9a3412'},
  {id:'integrations',label:'Integrations',          color:'#1e3a5f'},
  {id:'infra',    label:'Infrastructure',           color:'#334155'},
  {id:'scheduler',label:'Scheduler',               color:'#134e4a'},
  {id:'frontend', label:'Frontend (Genesis HUD)',   color:'#134e4a'},
];

const NODES=[
{id:'telegram',layer:'entry',label:'telegram_bot.py',sublabel:'Telegram Webhook + Bot',color:'#1e3a8a',
 file:'bot/telegram_bot.py',
 lines:{webhook:'L1-50',signature_verify:'L340-360',dedup:'L365-385',oauth_callback:'L437-448',health_check:'L459-500'},
 desc:'Main Telegram interface. Receives webhook POSTs, verifies X-Telegram-Bot-Api-Secret-Token via hmac.compare_digest, deduplicates by update_id in processed_updates table, routes to Harry for all message types including voice notes.',
 impacts:['master/harry.py — every message passes through','core/auth.py — PIN verification for sensitive commands','integrations/tts.py — voice note replies','bot/notifier.py — outbound alerts'],
 breaks:['Signature mismatch → 403 all messages (if WEBHOOK_SECRET set wrong)','Dedup failure → duplicate processing for burst messages','OAuth callback fails → Gmail re-auth broken','WEBHOOK_SECRET not set → any POST accepted (CRITICAL)'],
 checks:['WEBHOOK_SECRET env var set and matches BotFather secret','processed_updates table: check update_id rows','hmac import at L354','update_id NOT NULL in DB']},

{id:'dashboard_api',layer:'entry',label:'dashboard_api.py',sublabel:'32 REST endpoints + WebSocket',color:'#1e3a8a',
 file:'bot/dashboard_api.py',
 lines:{auth_check:'L1-40',chat_endpoint:'L80-120',ws_endpoint:'L150-200',transcribe:'L1853-1920',prompts_crud:'L800-900',kill_switch:'L600-650'},
 desc:'FastAPI application serving 32 REST endpoints and a WebSocket channel. Handles dashboard chat, TTS synthesis, audio transcription, agent management, kill-switch toggle, approval gates, and prompt CRUD. DASHBOARD_TOKEN=dev means all endpoints are currently open.',
 impacts:['All 32 API routes consumed by genesis-dashboard','WebSocket broadcasts to all connected clients','master/harry.py receives chat messages','core/auth.py validates the dashboard token'],
 breaks:['DASHBOARD_TOKEN not set or "dev" → all endpoints unauthenticated (CURRENT STATE)','Rate limiter failure → DoS window open','Agent name not validated → potential path traversal in prompts endpoint'],
 checks:['Set DASHBOARD_TOKEN to a real secret (not "dev")','_validate_agent_name() regex enforced on all agent-name params','MAX_AUDIO_BYTES check in /api/transcribe','hmac.compare_digest on token comparison']},

{id:'websocket',layer:'entry',label:'WebSocket /ws',sublabel:'Real-time dashboard feed',color:'#1e3a8a',
 file:'bot/dashboard_api.py',
 lines:{ws_route:'L150-200',broadcast:'L210-240',event_types:'L245-280'},
 desc:'Persistent WebSocket delivering live events to the Genesis HUD. Event types: log, snapshot, tool_call, kill_switch, chat_message, spoken, approval_resolved. Token passed as URL query param — this means it appears in nginx access logs.',
 impacts:['genesis-dashboard live updates (all panels)','Zustand store state changes via handleWsEvent'],
 breaks:['Token in URL → nginx access log exposure (design debt)','Connection registry not pruned → dead connections accumulate','New event type added server-side but not handled in store.ts → silent drop'],
 checks:['Token exposure in nginx /var/log/nginx/access.log','Store.ts handleWsEvent handles all 7 event types','Connection cleanup on client disconnect confirmed']},

{id:'harry_main',layer:'master',label:'master/harry.py',sublabel:'Harry._route_message() — central dispatcher',color:'#5b21b6',
 file:'master/harry.py',
 lines:{route_message:'L490-540',verify_response:'L570-620',auto_cleanup:'L1870-1890',bump_call:'L543-560',attach_spoken:'L560-580'},
 desc:'Singleton Harry class. Entry point for all messages. Calls CognitiveFlow pipeline, then runs _verify_response() safety scan on ALL responses including clarifications (moved before the clarification branch). Bumps call counts, stores memory, triggers voice synthesis.',
 impacts:['core/cognitive_flow.py — every message triggers pipeline','agents/memory_agent.py — stores each turn','integrations/tts.py — spoken version for voice','core/token_budget.py — cost tracking per call'],
 breaks:['_verify_response() inside clarification branch only → unsafe clarifications bypass scan (FIXED: moved before branch)','Weekly summary missing f-prefix → literal {agent_count} in message','_auto_cleanup uses relative path → misses logs dir (FIXED: now pathlib)'],
 checks:['L499: verify_response called BEFORE if not result.get("needs_clarification")','L1874: uses pathlib.Path(__file__).parent.parent / "logs"','f-string prefix on weekly summary message','_active_tasks dict has no leaked keys on idle']},

{id:'cognitive_flow',layer:'pipeline',label:'core/cognitive_flow.py',sublabel:'5-stage DONNA→MIKE→HARVEY→MIKE→DONNA pipeline',color:'#5b21b6',
 file:'core/cognitive_flow.py',
 lines:{process:'L50-120',donna_in:'L55-90',mike_route:'L120-200',harvey_verify:'L300-380',mike_synth:'L400-450',donna_out:'L450-520',decomposed_fix:'L105-115'},
 desc:'Orchestrates the full 5-phase cognitive pipeline. DONNA (input sanitization + episodic context) → MIKE (routing + agent execution) → HARVEY (safety verify + quality check) → MIKE (response synthesis) → DONNA (output formatting). Stores self._decomposed so _close() can access A3 goal plan.',
 impacts:['core/routing_engine.py — routing decision','All intelligence modules (A1-F33) — attached as middleware','core/response_synthesizer.py — multi-agent merge','core/harry_cache.py — cache reads/writes'],
 breaks:['_decomposed not saved as instance var → A3 goal plan silently skipped in _close() (FIXED)','_RESPONSE_CACHE unbounded growth over time (LRU cap at 128 entries)','Episodic context overwrite (dict overwrite instead of merge) → memory lost between turns'],
 checks:['self._decomposed = _decomposed assigned at L105','_RESPONSE_CACHE_MAX=128 with LRU eviction at L208','Episodic merge: verify dict update not overwrite at L185','_close() clears self._decomposed after use to free memory']},

{id:'routing_engine',layer:'routing',label:'core/routing_engine.py',sublabel:'L1 → L1.5 → L2 → L2.5 routing cascade',color:'#1e40af',
 file:'core/routing_engine.py',
 lines:{l1_keyword:'L100-200',l2_llm:'L250-300',l25_clarification:'L446-458',needs_clarif:'L307-380'},
 desc:'4-layer routing cascade. L1: keyword heuristic (fast, rule-based). L1.5: semantic embedding similarity via ChromaDB. L2: LLM classifier (Claude Haiku) when L1/L1.5 have low confidence. L2.5: clarification question — now only fires at confidence<0.50 AND ≥2 competing agents.',
 impacts:['Every single message routing decision','core/semantic_router.py — L1.5 lookup','core/bandit_router.py — UCB1 tiebreak','core/intent_chain.py — follow-up routing override'],
 breaks:['L2.5 threshold was 0.75 → over-asked clarification constantly (FIXED: now 0.50)','Clarification with only 1 alt agent → unhelpful asks (FIXED: requires ≥2 alts)','L2 LLM timeout → falls back to L1 result with warning'],
 checks:['L446: result.confidence < 0.50 (was 0.75)','L450: len(alt_agents) >= 2 enforced','L318: early return at confidence >= 0.5 skips L2','LLM_PROVIDER env var selects correct model for L2']},

{id:'semantic_router',layer:'routing',label:'core/semantic_router.py',sublabel:'L1.5: ChromaDB embedding similarity ≥0.70',color:'#1e40af',
 file:'core/semantic_router.py',
 lines:{semantic_route:'L1-80',add_example:'L85-120',stable_id:'L55-65'},
 desc:'Layer 1.5 routing using all-MiniLM-L6-v2 embeddings stored in ChromaDB. Routes if cosine similarity ≥ 0.70. ChromaDB document IDs now use MD5 hash (not Python hash()) ensuring stable IDs across process restarts — previously caused "document not found" errors.',
 impacts:['Routing for paraphrase queries without exact keyword matches','ChromaDB memory/chroma/ collection health'],
 breaks:['hash() used for IDs → non-deterministic across restarts (FIXED: MD5)','Cold start: no embeddings seeded → L1.5 falls through to L2 silently','ChromaDB process down → L1.5 skipped, L2 LLM used instead'],
 checks:['L55: hashlib.md5(message.encode()).hexdigest()[:8] for stable IDs','memory/chroma/ directory exists and non-empty','ChromaDB: systemctl status chroma-server','Similarity threshold 0.70 in SIMILARITY_THRESHOLD constant']},

{id:'intent_chain',layer:'routing',label:'core/intent_chain.py',sublabel:'B3: Multi-turn intent continuity tracker',color:'#1e40af',
 file:'core/intent_chain.py',
 lines:{track:'L1-80',get_active:'L85-120',expire:'L110-130'},
 desc:'B3 feature: tracks active agent intent across a 4-turn window. Follow-up messages ≤8 words OR containing "what about/why/explain/then" override routing to the current chain agent when routing confidence < 0.75. Chains expire after 4 turns or topic change.',
 impacts:['Routing override for short follow-up messages','intent_chains table in harry.db'],
 breaks:['Chain not expiring → wrong agent receives unrelated follow-up messages','Chain window too short for multi-step tasks (hardcoded 4)','Chain activation threshold 0.75 may conflict with L2.5 clarification 0.50'],
 checks:['intent_chains table rows expire after 4 turns','Check chain_agent matches expected agent for follow-ups','Confidence threshold for chain activation is separate from L2.5']},

{id:'bandit_router',layer:'routing',label:'core/bandit_router.py',sublabel:'B1: UCB1 multi-armed bandit routing',color:'#1e40af',
 file:'core/bandit_router.py',
 lines:{ucb1_select:'L36-69',record_outcome:'L72-93',bandit_report:'L96-124',load_arms:'L127-150'},
 desc:'B1 feature: UCB1 algorithm selects between competing agent candidates when routing confidence < 0.75. Score = (successes/total) + √(2·ln(N)/total). New arm pairs seeded with 1/2 (optimistic prior). FIXED: both DB queries now use standard aiosqlite cursor API instead of non-existent execute_fetchall().',
 impacts:['Agent selection for ambiguous message types over time','bandit_arms table — stores per (message_type, agent_name) stats'],
 breaks:['execute_fetchall() → AttributeError on aiosqlite (FIXED: cursor API)','Seeding fails on DB error → fallback to first candidate','N=0 (no history) → always picks candidates[0]'],
 checks:['Both DB calls: async with db.execute(sql) as cur: rows = await cur.fetchall()','bandit_arms has rows after first ambiguous query resolved','UCB1 score logged at DEBUG level for audit']},

{id:'reflection_engine',layer:'intelligence',label:'core/reflection_engine.py',sublabel:'A1 + F33: Quality scoring + self-critique',color:'#064e3b',
 file:'core/reflection_engine.py',
 lines:{score_response:'L1-80',critique:'L85-140',autotune:'L145-190'},
 desc:'A1: Scores every response 0-10 across Relevance (40%), Completeness (30%), Factuality (30%). Score<4.0 triggers auto-tuner. F33: Generates a self-critique that goes to execution trace ONLY — never appended to user response. Runs async/fire-and-forget to avoid blocking delivery.',
 impacts:['response_quality table — one row per response','Auto-tuner threshold adjustments for prompt improvement','Execution trace critique field (visible in /api/traces)'],
 breaks:['F33 critique was appended as "_Note: ..." to response (FIXED: now trace-only)','Score always 0.0 → auto-tuner fires every response','Async not fire-and-forget → blocks response delivery'],
 checks:['F33 output in trace.critique NOT in response string','response_quality table has new rows after each chat','Score non-zero for normal quality responses','asyncio.create_task() not await for fire-and-forget']},

{id:'contradiction_detector',layer:'intelligence',label:'core/contradiction_detector.py',sublabel:'A2: Memory vs response conflict detection',color:'#064e3b',
 file:'core/contradiction_detector.py',
 lines:{check:'L1-80',caveat:'L85-110'},
 desc:'A2 feature: Checks each response against top-3 ChromaDB memory nodes. If a CONTRADICTION is detected, appends a ⚠️ caveat to the response. MUST NOT fire for finance/weather/email agents where live API data always supersedes stored memory.',
 impacts:['User response content — adds caveat when contradiction detected','contradiction_log table — audit trail of detected conflicts'],
 breaks:['Finance not in exempt list → live BTC price vs old memory → false ⚠️ caveat','Exception in check() silently swallowed → no caveat when there should be one'],
 checks:['finance/weather/email in A2 exempt set','contradiction_log rows only for genuine contradictions','No ⚠️ in finance or weather responses','Exception logging in check() on failure']},

{id:'self_consistency',layer:'intelligence',label:'core/self_consistency.py',sublabel:'A4: 3 parallel LLM calls for consensus',color:'#064e3b',

// ── Render sidebar ────────────────────────────────────────────────────────────
let activeId = null;

function renderSidebar(query='') {
  const list = document.getElementById('sidebar-list');
  list.innerHTML = '';
  const q = query.toLowerCase();
  LAYERS.forEach(layer => {
    const nodes = NODES.filter(n => n.layer === layer.id);
    const matched = q ? nodes.filter(n =>
      n.label.toLowerCase().includes(q) ||
      n.sublabel.toLowerCase().includes(q) ||
      n.file.toLowerCase().includes(q) ||
      n.desc.toLowerCase().includes(q)
    ) : nodes;
    if (!matched.length) return;

    const grp = document.createElement('div');
    grp.className = 'layer-group' + (q || activeId && nodes.some(n=>n.id===activeId) ? ' open' : ' open');
    grp.innerHTML = `
      <div class="layer-hdr">
        <div class="layer-hdr-dot" style="background:${layer.color}"></div>
        <div class="layer-hdr-label">${layer.label}</div>
        <div class="layer-hdr-count">${matched.length}</div>
        <div class="layer-hdr-arrow">›</div>
      </div>
      <div class="layer-nodes"></div>`;
    grp.querySelector('.layer-hdr').addEventListener('click', () => {
      grp.classList.toggle('open');
    });
    const nodesDiv = grp.querySelector('.layer-nodes');
    matched.forEach(n => {
      const item = document.createElement('div');
      item.className = 'node-item' + (n.id === activeId ? ' active' : '') + (q ? ' match' : '');
      item.dataset.id = n.id;
      item.innerHTML = `
        <div class="node-dot" style="background:${layer.color}"></div>
        <div class="node-name">${n.label}</div>`;
      item.addEventListener('click', () => selectNode(n.id));
      nodesDiv.appendChild(item);
    });
    list.appendChild(grp);
  });
}

// ── Select node ───────────────────────────────────────────────────────────────
function selectNode(id) {
  activeId = id;
  const n = NODES.find(x => x.id === id);
  if (!n) return;
  renderSidebar(document.getElementById('search-input').value);

  document.getElementById('welcome').style.display = 'none';
  const dc = document.getElementById('detail-content');
  dc.style.display = 'block';

  const layer = LAYERS.find(l => l.id === n.layer);
  document.getElementById('dc-file').textContent = n.file;
  document.getElementById('dc-name').textContent = n.label;
  document.getElementById('dc-sublabel').textContent = n.sublabel;
  document.getElementById('dc-desc').textContent = n.desc;
  const badge = document.getElementById('dc-badge');
  badge.textContent = layer?.label || n.layer;
  badge.style.cssText = `color:${layer?.color};border-color:${layer?.color}22;background:${layer?.color}11`;

  const body = document.getElementById('dc-body');
  body.innerHTML = '';

  // Card: Key Lines
  if (n.lines && Object.keys(n.lines).length) {
    body.appendChild(card('Key Lines', layer?.color, `
      <div class="lines-grid">
        ${Object.entries(n.lines).map(([k,v]) => `
          <div class="line-row">
            <div class="line-key">${k}</div>
            <span class="line-badge" onclick="navigator.clipboard.writeText('${n.file}:${v}')">${v} ⎘</span>
          </div>`).join('')}
      </div>
    `));
  }

  // Card: Impacts
  if (n.impacts?.length) {
    body.appendChild(card('Impacts — what changing this affects', '#3b82f6', `
      <div class="impact-list">
        ${n.impacts.map(i => `<div class="impact-item">${i}</div>`).join('')}
      </div>
    `));
  }

  // Card: Breaks
  if (n.breaks?.length) {
    body.appendChild(card('Known Break Points', '#ef4444', `
      ${n.breaks.map(b => `
        <div class="break-item ${b.includes('FIXED') ? 'fixed' : 'unfixed'}">
          <div class="break-status ${b.includes('FIXED') ? 'ok' : 'warn'}">${b.includes('FIXED') ? 'FIXED' : 'RISK'}</div>
          <div class="break-text">${b.replace(/\(FIXED[^)]*\)/g, '<span style="color:#4ade80;font-size:9px">$&</span>')}</div>
        </div>`).join('')}
    `));
  }

  // Card: Debug Checklist
  if (n.checks?.length) {
    body.appendChild(card('Debug Checklist', '#a78bfa', `
      ${n.checks.map((c,i) => `
        <div class="check-item">
          <div class="check-num">${i+1}.</div>
          <div class="check-text">${c}</div>
        </div>`).join('')}
    `));
  }

  // Card: Connections
  const callsOut = EDGES.filter(e => e.from === id);
  const callsIn  = EDGES.filter(e => e.to   === id);
  if (callsOut.length || callsIn.length) {
    body.appendChild(card('Connections', '#22c55e', `
      ${callsOut.length ? `
        <div class="conn-section">
          <div class="conn-label conn-calls">→ calls out</div>
          ${callsOut.map(e => {
            const t = NODES.find(x=>x.id===e.to);
            return `<div class="conn-item" onclick="selectNode('${e.to}')">
              <div class="conn-item-arrow" style="color:#3b82f6">→</div>
              <div class="conn-item-name">${t?.label||e.to}</div>
              <div class="conn-item-label">${e.label}</div>
            </div>`;
          }).join('')}
        </div>` : ''}
      ${callsIn.length ? `
        <div class="conn-section">
          <div class="conn-label conn-from">← receives from</div>
          ${callsIn.map(e => {
            const s = NODES.find(x=>x.id===e.from);
            return `<div class="conn-item" onclick="selectNode('${e.from}')">
              <div class="conn-item-arrow" style="color:#22c55e">←</div>
              <div class="conn-item-name">${s?.label||e.from}</div>
              <div class="conn-item-label">${e.label}</div>
            </div>`;
          }).join('')}
        </div>` : ''}
    `));
  }

  // Scroll to top
  document.getElementById('detail').scrollTop = 0;
}

function card(title, color, contentHtml) {
  const d = document.createElement('div');
  d.className = 'dc-card';
  d.innerHTML = `
    <div class="dc-card-hdr">
      <div class="dc-card-hdr-dot" style="background:${color||'#3b82f6'}"></div>
      ${title}
    </div>
    <div class="dc-card-body">${contentHtml}</div>`;
  return d;
}

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
  renderSidebar(e.target.value.trim());
});

// ── Auth gate ─────────────────────────────────────────────────────────────────
(function(){
  // SHA-256 of PIN "harry2026"
  const HASH = "dd7183eb07b6aeb1fe723cf93237dc988ab0ea9fe8a9895e559c8b532d2f46b0";

  async function sha256(str){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  const gate  = document.getElementById('auth-gate');
  const input = document.getElementById('auth-input');
  const btn   = document.getElementById('auth-btn');
  const err   = document.getElementById('auth-error');

  if (sessionStorage.getItem('harry_auth') === '1') {
    gate.style.display = 'none';
    return;
  }

  let attempts = 0;
  async function tryUnlock(){
    const pin = input.value.trim();
    if (!pin) return;
    const h = await sha256(pin);
    if (h === HASH) {
      sessionStorage.setItem('harry_auth','1');
      gate.style.opacity = '0';
      gate.style.transition = 'opacity 0.4s';
      setTimeout(() => gate.style.display='none', 420);
    } else {
      attempts++;
      err.textContent = attempts >= 3
        ? `Incorrect PIN (attempt ${attempts})`
        : 'Incorrect PIN';
      input.value = '';
      input.classList.remove('shake');
      void input.offsetWidth;
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 400);
    }
  }

  btn.addEventListener('click', tryUnlock);
  input.addEventListener('keydown', e => { if(e.key==='Enter') tryUnlock(); });
})();

renderSidebar();
document.getElementById('stat-modules').textContent = NODES.length;
document.getElementById('stat-layers').textContent  = LAYERS.length;
document.getElementById('stat-edges').textContent   = EDGES.length;

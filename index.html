<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harry Agent OS — Architecture</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04081c;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:12px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Auth ── */
#auth-gate{position:fixed;inset:0;background:#04081c;z-index:9999;display:flex;align-items:center;justify-content:center}
#auth-box{background:#080f22;border:1px solid #1e3060;border-radius:12px;padding:44px 52px;display:flex;flex-direction:column;align-items:center;gap:20px;box-shadow:0 0 60px rgba(59,130,246,.1)}
#auth-logo{font-size:30px;letter-spacing:5px;color:#3b82f6;font-weight:700;text-shadow:0 0 24px rgba(59,130,246,.5)}
#auth-sub{font-size:10px;color:#334155;letter-spacing:2px;text-transform:uppercase;margin-top:-10px}
#auth-lbl{font-size:10px;color:#475569;letter-spacing:1px;text-transform:uppercase;align-self:flex-start}
#auth-in{background:#04081c;border:1px solid #1e3060;color:#e2e8f0;padding:10px 16px;border-radius:6px;font-family:inherit;font-size:16px;width:240px;letter-spacing:5px;text-align:center;outline:none;transition:border-color .2s}
#auth-in:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
#auth-in.shake{animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
#auth-btn{background:#1e3a8a;color:#93c5fd;border:1px solid #2563eb;border-radius:6px;padding:9px 36px;font-family:inherit;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;width:100%;transition:background .15s}
#auth-btn:hover{background:#2563eb;color:#fff}
#auth-err{font-size:10px;color:#ef4444;letter-spacing:1px;min-height:14px}
#auth-hint{font-size:9px;color:#1e293b;letter-spacing:1px}

/* ── Top bar ── */
#topbar{height:44px;min-height:44px;background:#060d20;border-bottom:1px solid #1e2d50;display:flex;align-items:center;gap:0;padding:0;flex-shrink:0}
#tb-brand{padding:0 18px;font-size:13px;font-weight:700;color:#3b82f6;letter-spacing:3px;text-shadow:0 0 12px rgba(59,130,246,.4);white-space:nowrap;border-right:1px solid #1e2d50;height:100%;display:flex;align-items:center}
#tb-tabs{display:flex;height:100%;padding:0 8px;gap:2px;align-items:center}
.tab-btn{padding:5px 16px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:4px;border:1px solid transparent;color:#334155;background:none;font-family:inherit;transition:all .15s}
.tab-btn:hover{color:#64748b;background:#0a1428}
.tab-btn.active{color:#93c5fd;background:#0f1e3a;border-color:#1e3060}
#tb-search{padding:0 12px;border-left:1px solid #1e2d50;height:100%;display:flex;align-items:center;flex:1;max-width:320px}
#search-input{width:100%;background:#04081c;border:1px solid #1e3060;color:#a0b4d0;padding:5px 10px;border-radius:5px;font-size:11px;font-family:inherit;outline:none}
#search-input:focus{border-color:#3b82f6}
#search-input::placeholder{color:#1e3060}
#tb-stats{margin-left:auto;display:flex;gap:16px;padding:0 16px;border-left:1px solid #1e2d50;height:100%;align-items:center}
.stat{font-size:9px;color:#334155;display:flex;gap:4px;align-items:center}
.stat b{color:#3b82f6}

/* ── Views ── */
#view-explorer{display:flex;flex:1;overflow:hidden}
#view-flow{display:none;flex:1;overflow:hidden;position:relative}

/* ── Explorer sidebar ── */
#ex-sidebar{width:256px;min-width:256px;background:#060d20;border-right:1px solid #1e2d50;overflow-y:auto;flex-shrink:0}
.lg{margin-bottom:2px}
.lg-hdr{padding:7px 12px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none}
.lg-hdr:hover{background:#0a1428}
.lg-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.lg-label{flex:1;color:#475569}
.lg-count{font-size:9px;color:#1e3060;font-weight:700}
.lg-arrow{font-size:8px;color:#1e3060;transition:transform .15s}
.lg.open .lg-arrow{transform:rotate(90deg)}
.lg-nodes{display:none}
.lg.open .lg-nodes{display:block}
.ni{padding:5px 12px 5px 26px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .1s}
.ni:hover{background:#0a1428}
.ni.active{background:#0f1e3a;border-left:2px solid #3b82f6;padding-left:24px}
.ni-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ni-name{font-size:10px;color:#64748b;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ni.active .ni-name{color:#cbd5e1}
.ni.match .ni-name{color:#93c5fd}

/* ── Detail panel (shared by both views) ── */
#detail-pane{width:400px;min-width:400px;background:#060d20;border-left:1px solid #1e2d50;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#dp-hero{padding:20px 22px 16px;border-bottom:1px solid #0f1e3a;background:#060d20;flex-shrink:0}
#dp-file{font-size:11px;color:#3b82f6;font-family:monospace;margin-bottom:3px}
#dp-name{font-size:17px;font-weight:700;color:#e2e8f0;margin-bottom:4px;line-height:1.2}
#dp-sub{font-size:10px;color:#475569;margin-bottom:10px}
.layer-badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:3px;border:1px solid;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
#dp-desc{font-size:10px;color:#94a3b8;line-height:1.7}
#dp-body{flex:1;overflow-y:auto;padding:14px 16px}
.dc{background:#04081c;border:1px solid #0f1e3a;border-radius:7px;overflow:hidden;margin-bottom:12px}
.dc-hdr{padding:7px 12px;background:#080f22;border-bottom:1px solid #0f1e3a;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#334155;display:flex;align-items:center;gap:6px}
.dc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dc-body{padding:10px 12px}
.line-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.lk{font-size:10px;color:#334155;width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb{display:inline-block;background:#0d1a36;border:1px solid #1e3060;color:#3b82f6;font-size:9px;padding:2px 7px;border-radius:3px;font-family:monospace;cursor:pointer}
.lb:hover{border-color:#3b82f6;background:#0f1e3a}
.bi{display:flex;gap:7px;margin-bottom:7px;padding:6px 9px;border-radius:5px;border:1px solid;align-items:flex-start}
.bi.fixed{background:#051a0e;border-color:#14532d}
.bi.risk{background:#1a0505;border-color:#450a0a}
.bs{font-size:9px;font-weight:700;width:34px;flex-shrink:0;padding-top:1px}
.bs.ok{color:#4ade80}.bs.warn{color:#f87171}
.bt{font-size:10px;color:#94a3b8;line-height:1.5;flex:1}
.ci{display:flex;gap:7px;margin-bottom:6px}
.cn{color:#1e4080;font-size:10px;width:16px;flex-shrink:0;padding-top:1px}
.ct{font-size:10px;color:#64748b;line-height:1.5;flex:1}
.ii{font-size:10px;color:#475569;padding:4px 8px;background:#04081c;border:1px solid #0f1e3a;border-radius:4px;display:flex;align-items:center;gap:5px;margin-bottom:4px;line-height:1.4}
.ii::before{content:'→';color:#1e3060;flex-shrink:0}
.conn-item{display:flex;align-items:center;gap:7px;padding:5px 8px;background:#04081c;border:1px solid #0f1e3a;border-radius:4px;margin-bottom:4px;cursor:pointer;transition:border-color .15s}
.conn-item:hover{border-color:#1e3060}
.conn-arrow{font-size:10px;flex-shrink:0}
.conn-name{font-size:10px;color:#60a5fa;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conn-lbl{font-size:9px;color:#1e3060;text-align:right;white-space:nowrap}
#dp-placeholder{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#1e3060}
#dp-placeholder-logo{font-size:40px;letter-spacing:6px;color:#0a1428;font-weight:700}
#dp-placeholder-txt{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#1e2d50}

/* ── Flow canvas ── */
#flow-canvas{flex:1;overflow:hidden;background:#04081c;position:relative}
svg#fc{width:100%;height:100%;cursor:grab}
svg#fc:active{cursor:grabbing}
.fnode{cursor:pointer}
.fnode:hover .fnbg{filter:brightness(1.25)}
.fnode.hl .fnbg{filter:brightness(1.5);stroke:#3b82f6!important;stroke-width:2!important}
.fnode.dim{opacity:.2}
.fntext{font-family:'JetBrains Mono',monospace;pointer-events:none;user-select:none}
#fc-controls{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:4px}
.fc-btn{width:28px;height:28px;background:#080f22;border:1px solid #1e2d50;color:#94a3b8;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;user-select:none}
.fc-btn:hover{background:#0f1e3a;color:#e2e8f0}
#fc-hint{position:absolute;bottom:14px;left:14px;color:#1e2d50;font-size:9px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#04081c}::-webkit-scrollbar-thumb{background:#1e2d50;border-radius:2px}
</style>
</head>
<body>

<!-- Auth -->
<div id="auth-gate">
  <div id="auth-box">
    <div id="auth-logo">HARRY</div>
    <div id="auth-sub">Agent OS · Architecture</div>
    <div id="auth-lbl">Access PIN</div>
    <input id="auth-in" type="password" maxlength="12" placeholder="••••••" autocomplete="off" autofocus>
    <div id="auth-err"></div>
    <button id="auth-btn">UNLOCK</button>
    <div id="auth-hint">Authorized access only</div>
  </div>
</div>

<!-- Top bar -->
<div id="topbar">
  <div id="tb-brand">HARRY</div>
  <div id="tb-tabs">
    <button class="tab-btn active" id="tab-explorer" onclick="switchTab('explorer')">Explorer</button>
    <button class="tab-btn" id="tab-flow" onclick="switchTab('flow')">Flow Chart</button>
  </div>
  <div id="tb-search">
    <input id="search-input" placeholder="Search modules, files…" autocomplete="off">
  </div>
  <div id="tb-stats">
    <div class="stat"><b>34</b> modules</div>
    <div class="stat"><b>10</b> layers</div>
    <div class="stat"><b>37</b> edges</div>
  </div>
</div>

<!-- Explorer view -->
<div id="view-explorer">
  <div id="ex-sidebar"></div>
  <div style="flex:1;overflow-y:auto;background:#04081c" id="ex-detail">
    <div id="dp-placeholder">
      <div id="dp-placeholder-logo">H</div>
      <div id="dp-placeholder-txt">Select a module</div>
    </div>
    <div id="ex-dc" style="display:none"></div>
  </div>
</div>

<!-- Flow view -->
<div id="view-flow">
  <div id="flow-canvas">
    <svg id="fc" viewBox="0 0 1400 1300"></svg>
    <div id="fc-controls">
      <div class="fc-btn" id="fc-in">+</div>
      <div class="fc-btn" id="fc-fit">⊡</div>
      <div class="fc-btn" id="fc-out">−</div>
    </div>
    <div id="fc-hint">click node · scroll/drag to pan</div>
  </div>
  <div id="detail-pane">
    <div id="dp-placeholder2" style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px">
      <div style="font-size:40px;letter-spacing:6px;color:#0a1428;font-weight:700">H</div>
      <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#1e2d50">Click a node</div>
    </div>
    <div id="dp-hero" style="display:none">
      <div id="dp-file"></div>
      <div id="dp-name"></div>
      <div id="dp-badge" class="layer-badge"></div>
      <div id="dp-sub"></div>
      <div id="dp-desc"></div>
    </div>
    <div id="dp-body" style="display:none;flex:1;overflow-y:auto;padding:14px 16px"></div>
  </div>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const LAYERS=[
  {id:'entry',    label:'Entry Points',          color:'#2563eb'},
  {id:'master',   label:'Master Dispatcher',     color:'#7c3aed'},
  {id:'pipeline', label:'Cognitive Pipeline',    color:'#7c3aed'},
  {id:'routing',  label:'Routing Layer',         color:'#1d4ed8'},
  {id:'intelligence',label:'Intelligence',       color:'#065f46'},
  {id:'agents',   label:'Agent Layer',           color:'#9a3412'},
  {id:'integrations',label:'Integrations',       color:'#1e3a5f'},
  {id:'infra',    label:'Infrastructure',        color:'#334155'},
  {id:'scheduler',label:'Scheduler',            color:'#134e4a'},
  {id:'frontend', label:'Frontend (Genesis HUD)',color:'#134e4a'},
];

// x,y,w,h for flow chart layout
const NODES=[
{id:'telegram',layer:'entry',x:130,y:50,w:190,h:44,label:'telegram_bot.py',sublabel:'Telegram Webhook + Bot',color:'#1e3a8a',
 file:'bot/telegram_bot.py',lines:{webhook:'L1-50',signature_verify:'L340-360',dedup:'L365-385',oauth_callback:'L437-448'},
 desc:'Receives webhook POSTs, verifies X-Telegram-Bot-Api-Secret-Token via hmac.compare_digest, deduplicates by update_id, routes to Harry for all message types.',
 impacts:['master/harry.py — every message','core/auth.py — PIN verification','integrations/tts.py — voice replies'],
 breaks:['Signature mismatch → 403 all messages','Dedup failure → duplicate processing','WEBHOOK_SECRET not set → any POST accepted (CRITICAL)'],
 checks:['WEBHOOK_SECRET env var set','processed_updates table rows present','hmac import at L354','update_id NOT NULL in DB']},

{id:'dashboard_api',layer:'entry',x:370,y:50,w:190,h:44,label:'dashboard_api.py',sublabel:'32 REST + WebSocket',color:'#1e3a8a',
 file:'bot/dashboard_api.py',lines:{auth_check:'L1-40',chat_endpoint:'L80-120',ws_endpoint:'L150-200',transcribe:'L1853-1920'},
 desc:'FastAPI serving 32 REST endpoints + WebSocket. Dashboard chat, TTS, transcription, agent mgmt, kill-switch, approval gates. DASHBOARD_TOKEN=dev → all endpoints open.',
 impacts:['All 32 API routes','WebSocket broadcasts','master/harry.py — chat','core/auth.py — token check'],
 breaks:['DASHBOARD_TOKEN="dev" → unauthenticated endpoints (CURRENT STATE)','Rate limiter failure → DoS window','Agent name not validated → path traversal'],
 checks:['Set DASHBOARD_TOKEN to real secret','_validate_agent_name() regex on all agent params','MAX_AUDIO_BYTES in /api/transcribe','hmac.compare_digest on token comparison']},

{id:'websocket',layer:'entry',x:610,y:50,w:190,h:44,label:'WebSocket /ws',sublabel:'Real-time dashboard feed',color:'#1e3a8a',
 file:'bot/dashboard_api.py',lines:{ws_route:'L150-200',broadcast:'L210-240',event_types:'L245-280'},
 desc:'Persistent WebSocket delivering live events: log, snapshot, tool_call, kill_switch, chat_message, spoken, approval_resolved. Token in URL → appears in nginx access logs.',
 impacts:['genesis-dashboard live updates','Zustand store via handleWsEvent'],
 breaks:['Token in URL → nginx log exposure','Dead connections accumulate in registry','New event type server-side not in store.ts → silently dropped'],
 checks:['nginx access log for token exposure','All 7 event types in handleWsEvent','Connection cleanup on client disconnect']},

{id:'harry_main',layer:'master',x:390,y:160,w:220,h:46,label:'master/harry.py',sublabel:'_route_message() — central dispatcher',color:'#5b21b6',
 file:'master/harry.py',lines:{route_message:'L490-540',verify_response:'L570-620',auto_cleanup:'L1870-1890',bump_call:'L543-560'},
 desc:'Singleton Harry class. Calls CognitiveFlow pipeline, runs _verify_response() safety scan on ALL responses (before clarification branch). Bumps call counts, stores memory, triggers voice.',
 impacts:['core/cognitive_flow.py — pipeline','agents/memory_agent.py — stores turns','integrations/tts.py — spoken version','core/token_budget.py — cost'],
 breaks:['_verify_response inside clarification branch → unsafe clarifications (FIXED)','Weekly summary missing f-prefix → literal {agent_count} shown','_auto_cleanup relative path → misses logs dir (FIXED: pathlib)'],
 checks:['L499: verify_response BEFORE if not needs_clarification','L1874: pathlib.Path(__file__).parent.parent / "logs"','f-string on weekly summary','_active_tasks dict clean on idle']},

{id:'cognitive_flow',layer:'pipeline',x:330,y:272,w:340,h:46,label:'core/cognitive_flow.py',sublabel:'5-phase DONNA→MIKE→HARVEY→MIKE→DONNA',color:'#5b21b6',
 file:'core/cognitive_flow.py',lines:{process:'L50-120',donna_in:'L55-90',mike_route:'L120-200',harvey_verify:'L300-380',donna_out:'L450-520'},
 desc:'Orchestrates the 5-phase pipeline. DONNA (input) → MIKE (routing+agent) → HARVEY (verify) → MIKE (synthesis) → DONNA (output). self._decomposed saved so _close() accesses A3 goal plan.',
 impacts:['core/routing_engine.py','All intelligence modules A1-F33','core/response_synthesizer.py','core/harry_cache.py'],
 breaks:['_decomposed not instance var → A3 silently skipped (FIXED)','_RESPONSE_CACHE unbounded → OOM (LRU cap 128)','Episodic context overwrite → memory lost'],
 checks:['self._decomposed = _decomposed at L105','_RESPONSE_CACHE_MAX=128 LRU at L208','Episodic merge: dict update not overwrite','_close() clears self._decomposed after use']},

{id:'routing_engine',layer:'routing',x:60,y:388,w:200,h:44,label:'core/routing_engine.py',sublabel:'L1→L1.5→L2→L2.5 routing',color:'#1e40af',
 file:'core/routing_engine.py',lines:{l1_keyword:'L100-200',l2_llm:'L250-300',l25_clarify:'L446-458'},
 desc:'4-layer routing. L1 keyword → L1.5 semantic → L2 LLM → L2.5 clarification. Clarification only at confidence<0.50 AND ≥2 competing agents.',
 impacts:['Every routing decision','core/semantic_router.py','core/bandit_router.py','core/intent_chain.py'],
 breaks:['L2.5 threshold was 0.75 → over-asked clarification (FIXED: 0.50)','Clarification with 1 alt agent (FIXED: requires ≥2)','L2 LLM timeout → L1 fallback'],
 checks:['L446: confidence < 0.50','L450: len(alt_agents) >= 2','Early return at confidence >= 0.5']},

{id:'semantic_router',layer:'routing',x:280,y:388,w:190,h:44,label:'core/semantic_router.py',sublabel:'L1.5: ChromaDB embeddings ≥0.70',color:'#1e40af',
 file:'core/semantic_router.py',lines:{semantic_route:'L1-80',stable_id:'L55-65'},
 desc:'Layer 1.5: all-MiniLM-L6-v2 in ChromaDB, similarity ≥0.70. IDs now MD5 (not Python hash) for cross-restart stability.',
 impacts:['Paraphrase routing','ChromaDB memory/chroma/'],
 breaks:['hash() IDs → non-deterministic (FIXED: MD5)','Cold start: no embeddings → falls to L2','ChromaDB down → L1.5 skipped'],
 checks:['hashlib.md5 at L55','memory/chroma/ non-empty','systemctl status chroma-server']},

{id:'intent_chain',layer:'routing',x:490,y:388,w:190,h:44,label:'core/intent_chain.py',sublabel:'B3: Multi-turn intent continuity',color:'#1e40af',
 file:'core/intent_chain.py',lines:{track:'L1-80',expire:'L110-130'},
 desc:'B3: Tracks active agent intent 4-turn window. Follow-ups ≤8 words or "what about/why/explain/then" override routing at confidence<0.75.',
 impacts:['Follow-up routing override','intent_chains table'],
 breaks:['Chain not expiring → wrong agent for unrelated follow-ups','4-turn window may be too short'],
 checks:['intent_chains rows expire after 4 turns','Chain agent matches expected']},

{id:'bandit_router',layer:'routing',x:700,y:388,w:190,h:44,label:'core/bandit_router.py',sublabel:'B1: UCB1 adaptive agent selection',color:'#1e40af',
 file:'core/bandit_router.py',lines:{ucb1_select:'L36-69',record_outcome:'L72-93',load_arms:'L127-150'},
 desc:'B1: UCB1 selects between competing agents at confidence<0.75. score=(s/n)+√(2·ln(N)/n). FIXED: execute_fetchall() → standard cursor API.',
 impacts:['Ambiguous query routing','bandit_arms table'],
 breaks:['execute_fetchall() → AttributeError (FIXED: cursor API)','N=0 → always picks candidates[0]'],
 checks:['async with db.execute() as cur: rows = await cur.fetchall()','bandit_arms rows after first ambiguous query']},

{id:'reflection_engine',layer:'intelligence',x:40,y:500,w:165,h:42,label:'reflection_engine.py',sublabel:'A1+F33: Score + critique',color:'#064e3b',
 file:'core/reflection_engine.py',lines:{score:'L1-80',critique:'L85-140',autotune:'L145-190'},
 desc:'A1: Scores responses 0-10 (Relevance 40%+Completeness 30%+Factuality 30%). F33: Self-critique to trace ONLY, never user output. Async/fire-and-forget.',
 impacts:['response_quality table','Auto-tuner','Trace critique field'],
 breaks:['F33 leaked as "_Note:" to user (FIXED: trace-only)','Score=0 always → over-triggers auto-tuner'],
 checks:['F33 in trace.critique NOT response','response_quality rows after each chat','asyncio.create_task() not await']},

{id:'contradiction_detector',layer:'intelligence',x:215,y:500,w:165,h:42,label:'contradiction_detector.py',sublabel:'A2: Memory vs response',color:'#064e3b',
 file:'core/contradiction_detector.py',lines:{check:'L1-80',caveat:'L85-110'},
 desc:'A2: Checks response against top-3 ChromaDB memory nodes. Appends ⚠️ if CONTRADICTION. Must NOT fire for finance/weather (live data supersedes memory).',
 impacts:['User response ⚠️ caveat','contradiction_log table'],
 breaks:['Finance not exempt → false ⚠️ on live prices','Exception silently swallowed'],
 checks:['finance/weather in A2 exempt set','No ⚠️ in finance/weather responses']},

{id:'self_consistency',layer:'intelligence',x:390,y:500,w:165,h:42,label:'self_consistency.py',sublabel:'A4: 3-parallel consensus',color:'#064e3b',
 file:'core/self_consistency.py',lines:{check:'L1-80',exempt:'L30-45'},
 desc:'A4: 3 parallel LLM calls for high-stakes queries. _A4_EXEMPT={"finance","weather","email","calendar","memory","health"} prevents live data overwrite.',
 impacts:['High-stakes quality (3x cost)','Finance always bypasses A4'],

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(t) {
  document.getElementById('view-explorer').style.display = t==='explorer' ? 'flex' : 'none';
  document.getElementById('view-flow').style.display     = t==='flow'     ? 'flex' : 'none';
  document.getElementById('tab-explorer').classList.toggle('active', t==='explorer');
  document.getElementById('tab-flow').classList.toggle('active', t==='flow');
}

// ── Shared detail renderer ────────────────────────────────────────────────────
function renderDetail(n, targetBody, targetHero) {
  const layer = LAYERS.find(l => l.id === n.layer);

  if (targetHero) {
    document.getElementById('dp-file').textContent    = n.file;
    document.getElementById('dp-name').textContent    = n.label;
    document.getElementById('dp-sub').textContent     = n.sublabel;
    document.getElementById('dp-desc').textContent    = n.desc;
    const badge = document.getElementById('dp-badge');
    badge.textContent   = layer?.label || n.layer;
    badge.style.cssText = `color:${layer?.color};border-color:${layer?.color}22;background:${layer?.color}11`;
    document.getElementById('dp-hero').style.display  = '';
    document.getElementById('dp-body').style.display  = '';
    document.getElementById('dp-placeholder2') && (document.getElementById('dp-placeholder2').style.display='none');
  }

  targetBody.innerHTML = '';

  // Lines
  if (n.lines && Object.keys(n.lines).length) {
    targetBody.appendChild(mkCard('Key Lines', layer?.color, `
      ${Object.entries(n.lines).map(([k,v])=>`
        <div class="line-row">
          <div class="lk">${k}</div>
          <span class="lb" title="Copy ${n.file}:${v}" onclick="navigator.clipboard.writeText('${n.file}:${v}')">${v} ⎘</span>
        </div>`).join('')}`));
  }

  // Impacts
  if (n.impacts?.length) {
    targetBody.appendChild(mkCard('Impacts', '#3b82f6',
      n.impacts.map(i=>`<div class="ii">${i}</div>`).join('')));
  }

  // Breaks
  if (n.breaks?.length) {
    targetBody.appendChild(mkCard('Break Points', '#ef4444',
      n.breaks.map(b=>`
        <div class="bi ${b.includes('FIXED')?'fixed':'risk'}">
          <div class="bs ${b.includes('FIXED')?'ok':'warn'}">${b.includes('FIXED')?'FIXED':'RISK'}</div>
          <div class="bt">${b}</div>
        </div>`).join('')));
  }

  // Checks
  if (n.checks?.length) {
    targetBody.appendChild(mkCard('Debug Checklist', '#a78bfa',
      n.checks.map((c,i)=>`
        <div class="ci"><div class="cn">${i+1}.</div><div class="ct">${c}</div></div>`).join('')));
  }

  // Connections
  const out = EDGES.filter(e=>e.from===n.id);
  const inn = EDGES.filter(e=>e.to===n.id);
  if (out.length||inn.length) {
    targetBody.appendChild(mkCard('Connections', '#22c55e', `
      ${out.length?`<div style="font-size:9px;color:#3b82f6;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">→ calls out</div>
        ${out.map(e=>{const t=NODES.find(x=>x.id===e.to);return`<div class="conn-item" onclick="jumpTo('${e.to}')">
          <div class="conn-arrow" style="color:#3b82f6">→</div>
          <div class="conn-name">${t?.label||e.to}</div>
          <div class="conn-lbl">${e.label}</div>
        </div>`;}).join('')}`:''}
      ${inn.length?`<div style="font-size:9px;color:#22c55e;letter-spacing:1px;text-transform:uppercase;margin:8px 0 6px">← receives from</div>
        ${inn.map(e=>{const s=NODES.find(x=>x.id===e.from);return`<div class="conn-item" onclick="jumpTo('${e.from}')">
          <div class="conn-arrow" style="color:#22c55e">←</div>
          <div class="conn-name">${s?.label||e.from}</div>
          <div class="conn-lbl">${e.label}</div>
        </div>`;}).join('')}`:''}
    `));
  }
}

function mkCard(title, color, html) {
  const d = document.createElement('div');
  d.className = 'dc';
  d.innerHTML = `<div class="dc-hdr"><div class="dc-dot" style="background:${color||'#3b82f6'}"></div>${title}</div><div class="dc-body">${html}</div>`;
  return d;
}

function jumpTo(id) {
  // If in flow view, select in flow; if in explorer, select in explorer
  const inFlow = document.getElementById('view-flow').style.display !== 'none';
  if (inFlow) { highlightFlowNode(id); showFlowDetail(id); }
  else { selectExplorerNode(id); }
}

// ── EXPLORER ──────────────────────────────────────────────────────────────────
let exActive = null;

function renderSidebar(query='') {
  const list = document.getElementById('ex-sidebar');
  list.innerHTML = '';
  const q = query.toLowerCase();
  LAYERS.forEach(layer => {
    const nodes = NODES.filter(n=>n.layer===layer.id);
    const matched = q ? nodes.filter(n=>
      n.label.toLowerCase().includes(q)||n.sublabel.toLowerCase().includes(q)||
      n.file.toLowerCase().includes(q)||n.desc.toLowerCase().includes(q)
    ) : nodes;
    if (!matched.length) return;
    const grp = document.createElement('div');
    grp.className = 'lg open';
    grp.innerHTML = `<div class="lg-hdr">
      <div class="lg-dot" style="background:${layer.color}"></div>
      <div class="lg-label">${layer.label}</div>
      <div class="lg-count">${matched.length}</div>
      <div class="lg-arrow">›</div>
    </div><div class="lg-nodes"></div>`;
    grp.querySelector('.lg-hdr').addEventListener('click',()=>grp.classList.toggle('open'));
    const nd = grp.querySelector('.lg-nodes');
    matched.forEach(n=>{
      const item = document.createElement('div');
      item.className = 'ni'+(n.id===exActive?' active':'')+(q?' match':'');
      item.dataset.id = n.id;
      item.innerHTML = `<div class="ni-dot" style="background:${layer.color}"></div><div class="ni-name">${n.label}</div>`;
      item.addEventListener('click',()=>selectExplorerNode(n.id));
      nd.appendChild(item);
    });
    list.appendChild(grp);
  });
}

function selectExplorerNode(id) {
  exActive = id;
  const n = NODES.find(x=>x.id===id);
  if (!n) return;
  renderSidebar(document.getElementById('search-input').value);
  document.getElementById('dp-placeholder').style.display = 'none';
  const dc = document.getElementById('ex-dc');
  dc.style.display = 'block';

  const layer = LAYERS.find(l=>l.id===n.layer);
  // Hero in explorer
  let hero = document.getElementById('ex-hero');
  if (!hero) {
    hero = document.createElement('div');
    hero.id = 'ex-hero';
    hero.style.cssText = 'padding:20px 24px 16px;border-bottom:1px solid #0f1e3a;background:#060d20;flex-shrink:0';
    dc.insertBefore(hero, dc.firstChild);
  }
  hero.innerHTML = `
    <div style="font-size:11px;color:#3b82f6;font-family:monospace;margin-bottom:3px">${n.file}</div>
    <div style="font-size:17px;font-weight:700;color:#e2e8f0;margin-bottom:6px">${n.label}</div>
    <span class="layer-badge" style="color:${layer?.color};border-color:${layer?.color}22;background:${layer?.color}11">${layer?.label||n.layer}</span>
    <div style="font-size:10px;color:#475569;margin-bottom:10px">${n.sublabel}</div>
    <div style="font-size:10px;color:#94a3b8;line-height:1.7">${n.desc}</div>`;

  let body = document.getElementById('ex-body');
  if (!body) {
    body = document.createElement('div');
    body.id = 'ex-body';
    body.style.cssText = 'padding:14px 16px';
    dc.appendChild(body);
  }
  renderDetail(n, body, false);
  document.getElementById('ex-detail').scrollTop = 0;
}

document.getElementById('search-input').addEventListener('input', e => {
  renderSidebar(e.target.value.trim());
});

// ── FLOW CHART ────────────────────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('fc');
function svgEl(tag, attrs={}) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}

const defs = svgEl('defs');
const mkr = svgEl('marker',{id:'arr',markerWidth:'8',markerHeight:'8',refX:'6',refY:'3',orient:'auto'});
mkr.appendChild(svgEl('path',{d:'M0,0 L0,6 L8,3 z',fill:'#1e3060'}));
const mkr2 = svgEl('marker',{id:'arr-hi',markerWidth:'8',markerHeight:'8',refX:'6',refY:'3',orient:'auto'});
mkr2.appendChild(svgEl('path',{d:'M0,0 L0,6 L8,3 z',fill:'#3b82f6'}));
defs.appendChild(mkr); defs.appendChild(mkr2);
svg.appendChild(defs);

// Layer background bands
const LAYER_Y = {entry:30,master:145,pipeline:255,routing:370,intelligence:480,agents:590,integrations:698,infra:806,scheduler:914,frontend:1026};
for (const [lid, ly] of Object.entries(LAYER_Y)) {
  const layer = LAYERS.find(l=>l.id===lid);
  const bg = svgEl('rect',{x:0,y:ly-12,width:1400,height:16,fill:layer?.color||'#333',opacity:'0.07'});
  svg.insertBefore(bg, svg.firstChild);
  const lbl = svgEl('text',{x:8,y:ly-1,'font-size':'8','font-weight':'700',fill:layer?.color||'#ccc','font-family':'JetBrains Mono,monospace','letter-spacing':'1.5',opacity:'0.6'});
  lbl.textContent = '// ' + (layer?.label||lid).toUpperCase();
  svg.appendChild(lbl);
}

const edgeGroup = svgEl('g',{id:'edges'});
const nodeGroup = svgEl('g',{id:'fnodes'});
svg.appendChild(edgeGroup);
svg.appendChild(nodeGroup);

const edgeEls = {};
for (const e of EDGES) {
  const f = NODES.find(n=>n.id===e.from), t = NODES.find(n=>n.id===e.to);
  if (!f||!t) continue;
  const fx=f.x+f.w/2, fy=f.y+f.h, tx=t.x+t.w/2, ty=t.y, my=(fy+ty)/2;
  const g = svgEl('g',{'data-from':e.from,'data-to':e.to});
  const path = svgEl('path',{d:`M${fx},${fy} C${fx},${my} ${tx},${my} ${tx},${ty}`,stroke:'#1e3060',fill:'none','stroke-width':'1.2','marker-end':'url(#arr)'});
  g.appendChild(path);
  if (e.label) {
    const lbl = svgEl('text',{x:(fx+tx)/2,y:(fy+ty)/2,'text-anchor':'middle',fill:'#1e3a60','font-size':'7.5','font-family':'JetBrains Mono,monospace'});
    lbl.textContent = e.label;
    g.appendChild(lbl);
  }
  edgeGroup.appendChild(g);
  [e.from,e.to].forEach(id=>{
    if (!edgeEls[id]) edgeEls[id]=[];
    edgeEls[id].push({g,path});
  });
}

const flowNodeEls = {};
for (const n of NODES) {
  const g = svgEl('g',{class:'fnode','data-id':n.id,transform:`translate(${n.x},${n.y})`});
  const bg = svgEl('rect',{class:'fnbg',width:n.w,height:n.h,rx:5,fill:n.color,stroke:'#1e2d50','stroke-width':'1'});
  g.appendChild(bg);
  const txt = svgEl('text',{x:n.w/2,y:n.h/2-5,'text-anchor':'middle',fill:'#e2e8f0','font-size':'9.5','font-weight':'700','font-family':'JetBrains Mono,monospace',class:'fntext'});
  txt.textContent = n.label;
  g.appendChild(txt);
  const sub = svgEl('text',{x:n.w/2,y:n.h/2+8,'text-anchor':'middle',fill:'#94a3b8','font-size':'8','font-family':'JetBrains Mono,monospace',class:'fntext'});
  sub.textContent = n.sublabel;
  g.appendChild(sub);
  g.addEventListener('click',()=>{ highlightFlowNode(n.id); showFlowDetail(n.id); });
  nodeGroup.appendChild(g);
  flowNodeEls[n.id] = {g,bg};
}

function highlightFlowNode(id) {
  const connected = new Set([id]);
  for (const e of EDGES) { if(e.from===id) connected.add(e.to); if(e.to===id) connected.add(e.from); }
  for (const [nid,{g}] of Object.entries(flowNodeEls)) {
    g.classList.toggle('hl', nid===id);
    g.classList.toggle('dim', !connected.has(nid));
  }
  for (const [,arr] of Object.entries(edgeEls)) {
    arr.forEach(({g:eg,path})=>{
      const isConn = EDGES.some(e=>(e.from===id||e.to===id)&&eg.dataset.from===e.from&&eg.dataset.to===e.to);
      path.setAttribute('stroke', isConn?'#3b82f6':'#0f1830');
      path.setAttribute('marker-end', isConn?'url(#arr-hi)':'url(#arr)');
      eg.style.opacity = isConn?'1':'0.15';
    });
  }
}

function showFlowDetail(id) {
  const n = NODES.find(x=>x.id===id); if(!n) return;
  document.getElementById('dp-placeholder2') && (document.getElementById('dp-placeholder2').style.display='none');
  document.getElementById('dp-hero').style.display = '';
  document.getElementById('dp-body').style.display = '';
  renderDetail(n, document.getElementById('dp-body'), true);
  document.getElementById('detail-pane').querySelector('#dp-body').scrollTop = 0;
}

// Pan + zoom
let vb = {x:-10,y:-10,w:1420,h:1120};
let drag=false, lx=0, ly_=0;
const canvas = document.getElementById('flow-canvas');
function applyVB(){ svg.setAttribute('viewBox',`${vb.x} ${vb.y} ${vb.w} ${vb.h}`); }
applyVB();
svg.addEventListener('mousedown',e=>{ if(e.target.closest('.fnode')) return; drag=true; lx=e.clientX; ly_=e.clientY; });
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag) return;
  vb.x-=(e.clientX-lx)/canvas.clientWidth*vb.w;
  vb.y-=(e.clientY-ly_)/canvas.clientHeight*vb.h;
  lx=e.clientX; ly_=e.clientY; applyVB();
});
svg.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?1.1:.91;
  const cx=vb.x+(e.offsetX/canvas.clientWidth)*vb.w;
  const cy=vb.y+(e.offsetY/canvas.clientHeight)*vb.h;
  vb.w*=f; vb.h*=f;
  vb.x=cx-(e.offsetX/canvas.clientWidth)*vb.w;
  vb.y=cy-(e.offsetY/canvas.clientHeight)*vb.h;
  applyVB();
},{passive:false});
document.getElementById('fc-in').onclick=()=>{vb.w*=.8;vb.h*=.8;applyVB()};
document.getElementById('fc-out').onclick=()=>{vb.w*=1.25;vb.h*=1.25;applyVB()};
document.getElementById('fc-fit').onclick=()=>{vb={x:-10,y:-10,w:1420,h:1120};applyVB()};

// ── Auth ──────────────────────────────────────────────────────────────────────
(function(){
  const HASH="dd7183eb07b6aeb1fe723cf93237dc988ab0ea9fe8a9895e559c8b532d2f46b0";
  async function sha256(s){
    const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
    return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  const gate=document.getElementById('auth-gate'),inp=document.getElementById('auth-in'),
        btn=document.getElementById('auth-btn'),err=document.getElementById('auth-err');
  if(sessionStorage.getItem('harry_auth')==='1'){gate.style.display='none';return;}
  let att=0;
  async function tryUnlock(){
    const pin=inp.value.trim(); if(!pin) return;
    const h=await sha256(pin);
    if(h===HASH){
      sessionStorage.setItem('harry_auth','1');
      gate.style.opacity='0'; gate.style.transition='opacity .4s';
      setTimeout(()=>gate.style.display='none',420);
    } else {
      att++;
      err.textContent=att>=3?`Incorrect PIN (attempt ${att})`:'Incorrect PIN';
      inp.value=''; inp.classList.remove('shake'); void inp.offsetWidth; inp.classList.add('shake');
      setTimeout(()=>inp.classList.remove('shake'),400);
    }
  }
  btn.addEventListener('click',tryUnlock);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
})();

// ── Init ──────────────────────────────────────────────────────────────────────
renderSidebar();
selectExplorerNode('harry_main');  // auto-select on load
</script>
